<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 方案採購比較表</title>
    <style>
        :root {
            --brand-color: #1a202c;
            --sub-brand: #2d3748;
            --accent-blue: #3182ce;
            --text-main: #2d3748;
            --bg-light: #f7fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .dashboard-header {
            background-color: var(--brand-color);
            padding: 24px 32px;
            border-bottom: 4px solid var(--accent-blue);
        }

        .dashboard-header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* 標頭樣式 */
        thead th {
            background-color: #ffffff;
            color: var(--brand-color);
            padding: 30px 15px;
            font-size: 18px;
            font-weight: 800;
            border-bottom: 2px solid var(--border);
            border-right: 1px solid var(--border);
        }
